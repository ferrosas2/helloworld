# Cloud Build configuration for CI/CD pipeline
# Triggered automatically on git push to main branch

steps:
  # Step 1: Run unit tests
  - name: 'python:3.10-slim'
    id: 'run-tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio
        pytest tests/ --cov=src --cov=api --cov-report=term-missing || exit 1
    waitFor: ['-']

  # Step 2: Security scanning with Trivy
  - name: 'aquasec/trivy:latest'
    id: 'security-scan'
    args:
      - 'fs'
      - '--severity'
      - 'HIGH,CRITICAL'
      - '--exit-code'
      - '0'
      - '.'
    waitFor: ['-']

  # Step 3: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'
      - '.'
    waitFor: ['run-tests']

  # Step 4: Push Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}'
    waitFor: ['build-image']

  # Step 5: Scan Docker image for vulnerabilities
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'scan-image'
    args:
      - 'artifacts'
      - 'docker'
      - 'images'
      - 'scan'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--location=${_REGION}'
    waitFor: ['push-image']

  # Step 6: Deploy to Cloud Run (Staging)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-staging'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}-staging'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=GCP_PROJECT_ID=${PROJECT_ID},GCP_REGION=${_REGION},GCS_BUCKET_NAME=${_GCS_BUCKET},VERTEX_INDEX_ID=${_VERTEX_INDEX_ID},VERTEX_ENDPOINT_ID=${_VERTEX_ENDPOINT_ID}'
      - '--service-account=${_SERVICE_ACCOUNT}'
      - '--max-instances=10'
      - '--min-instances=0'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=300'
      - '--concurrency=80'
    waitFor: ['scan-image']

  # Step 7: Run integration tests against staging
  - name: 'python:3.10-slim'
    id: 'integration-tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install requests pytest
        export STAGING_URL=$(gcloud run services describe ${_SERVICE_NAME}-staging --region=${_REGION} --format='value(status.url)')
        pytest tests/integration/ --staging-url=$STAGING_URL || exit 1
    waitFor: ['deploy-staging']

  # Step 8: Deploy to Cloud Run (Production) - Manual approval required
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-production'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=GCP_PROJECT_ID=${PROJECT_ID},GCP_REGION=${_REGION},GCS_BUCKET_NAME=${_GCS_BUCKET},VERTEX_INDEX_ID=${_VERTEX_INDEX_ID},VERTEX_ENDPOINT_ID=${_VERTEX_ENDPOINT_ID}'
      - '--service-account=${_SERVICE_ACCOUNT}'
      - '--max-instances=50'
      - '--min-instances=1'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=300'
      - '--concurrency=80'
      - '--tag=prod-${SHORT_SHA}'
    waitFor: ['integration-tests']

# Substitution variables (can be overridden)
substitutions:
  _REGION: 'us-central1'
  _ARTIFACT_REPO: 'ro-fraud-repo'
  _SERVICE_NAME: 'ro-fraud-service'
  _GCS_BUCKET: 'your-gcs-bucket-name'
  _VERTEX_INDEX_ID: 'your-vertex-index-id'
  _VERTEX_ENDPOINT_ID: 'your-vertex-endpoint-id'
  _SERVICE_ACCOUNT: 'ro-fraud-api-sa@${PROJECT_ID}.iam.gserviceaccount.com'

# Build configuration
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  
# Build timeout (30 minutes)
timeout: '1800s'

# Images to be pushed to Artifact Registry
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'
